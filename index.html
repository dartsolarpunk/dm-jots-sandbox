<script type="importmap">
{ "imports": { "three": "./three.webgpu.js", "three/webgpu": "./three.webgpu.js", "three/tsl": "./three.tsl.js" } }

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from './OrbitControls.js';
import {
  Fn, If, Loop, storage, instanceIndex, uint, int, float, vec3, vec4,
  select, mx_fractal_noise_float, mx_worley_noise_float, normalWorld, positionWorld, positionView,
  cameraPosition, mix, viewportLinearDepth, linearDepth, screenUV, time,
  normalize as tslNormalize, smoothstep, clamp, pow, reflect, dot, exp, uniform,
  texture, perspectiveDepthToViewZ, cameraNear, cameraFar
} from 'three/tsl';
import { EdgeVertexIndices, EdgeMasks, TriangleTable } from './mc_tables.js';

const info = document.getElementById('info');
// Real touch-capability detection, not screen width - a tablet in
// landscape can easily be wider than a "desktop" breakpoint.
const hasTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
if(hasTouch){
  document.getElementById('joy-move').style.display = 'block';
  document.getElementById('joy-look').style.display = 'block';
  document.getElementById('jump-btn').style.display = 'flex';
}
const log = (s)=>{ info.textContent += s + '\n'; console.log(s); };

function hash3(x,y,z){ let h=Math.sin(x*127.1+y*311.7+z*74.7)*43758.5453123; return h-Math.floor(h); }
function valueNoise3(x,y,z){
  const xi=Math.floor(x),yi=Math.floor(y),zi=Math.floor(z);
  const xf=x-xi,yf=y-yi,zf=z-zi;
  const u=xf*xf*(3-2*xf),v=yf*yf*(3-2*yf),w=zf*zf*(3-2*zf);
  const lerp=(a,b,t)=>a+(b-a)*t;
  const c000=hash3(xi,yi,zi),c100=hash3(xi+1,yi,zi),c010=hash3(xi,yi+1,zi),c110=hash3(xi+1,yi+1,zi);
  const c001=hash3(xi,yi,zi+1),c101=hash3(xi+1,yi,zi+1),c011=hash3(xi,yi+1,zi+1),c111=hash3(xi+1,yi+1,zi+1);
  const x00=lerp(c000,c100,u),x10=lerp(c010,c110,u),x01=lerp(c001,c101,u),x11=lerp(c011,c111,u);
  const y0=lerp(x00,x10,v),y1=lerp(x01,x11,v);
  return lerp(y0,y1,w)*2-1;
}
function fractalNoise3(x,y,z,octaves,lac,gain){
  let amp=1,freq=1,sum=0,norm=0;
  for(let i=0;i<octaves;i++){ sum+=valueNoise3(x*freq,y*freq,z*freq)*amp; norm+=amp; amp*=gain; freq*=lac; }
  return sum/norm;
}
const PLANET_RADIUS = 12;
// Real bug found: this JS noise approximation never got updated when
// craters were added to the GPU density function - the character's
// collision "ground" and the actual rendered terrain silently drifted
// apart wherever a crater bowl/rim was, and more importantly the two
// use completely different hash/noise implementations so they could
// never be made to match by tuning constants. If the player was ever
// standing somewhere onGround's approximation disagreed with reality
// (floating slightly above or embedded slightly below the real
// surface), the jump's `onGround` check could go permanently false -
// which fully explains "tapping does nothing," on top of the earlier
// race-condition fix. Real fix: read back the ACTUAL GPU-computed
// density field once after the compute pass and sample that directly
// for collision - guaranteed pixel-consistent with the rendered mesh,
// including every crater, by construction, not by approximation.
let densityArray = null, densityGridInfo = null;
function sampleDensityAt(wx, wy, wz){
  const { GRID, CELL, HALF } = densityGridInfo;
  let gx=(wx+HALF)/CELL, gy=(wy+HALF)/CELL, gz=(wz+HALF)/CELL;
  gx=Math.max(0,Math.min(gx,GRID-1.001));
  gy=Math.max(0,Math.min(gy,GRID-1.001));
  gz=Math.max(0,Math.min(gz,GRID-1.001));
  const gx0=Math.floor(gx), gy0=Math.floor(gy), gz0=Math.floor(gz);
  const gx1=gx0+1, gy1=gy0+1, gz1=gz0+1;
  const fx=gx-gx0, fy=gy-gy0, fz=gz-gz0;
  const idx=(x,y,z)=> x + y*GRID + z*GRID*GRID;
  const c000=densityArray[idx(gx0,gy0,gz0)], c100=densityArray[idx(gx1,gy0,gz0)];
  const c010=densityArray[idx(gx0,gy1,gz0)], c110=densityArray[idx(gx1,gy1,gz0)];
  const c001=densityArray[idx(gx0,gy0,gz1)], c101=densityArray[idx(gx1,gy0,gz1)];
  const c011=densityArray[idx(gx0,gy1,gz1)], c111=densityArray[idx(gx1,gy1,gz1)];
  const x00=c000+(c100-c000)*fx, x10=c010+(c110-c010)*fx, x01=c001+(c101-c001)*fx, x11=c011+(c111-c011)*fx;
  const y0=x00+(x10-x00)*fy, y1=x01+(x11-x01)*fy;
  return y0+(y1-y0)*fz;
}
function groundRadiusReal(dirX,dirY,dirZ){
  const { HALF } = densityGridInfo;
  const step = 0.1;
  let r = PLANET_RADIUS - 3.5;
  let prevD = sampleDensityAt(dirX*r, dirY*r, dirZ*r);
  const maxR = HALF*0.97;
  while(r < maxR){
    const rN = r+step;
    const d = sampleDensityAt(dirX*rN, dirY*rN, dirZ*rN);
    if(prevD < 0 && d >= 0){
      const t = prevD/(prevD-d);
      return r + t*step;
    }
    prevD = d; r = rN;
  }
  return PLANET_RADIUS;
}
function groundRadiusAt(dirX,dirY,dirZ){
  if(densityArray) return groundRadiusReal(dirX,dirY,dirZ);
  // Fallback only for the brief window before the real density data is
  // ready - not used once the game has actually started.
  return PLANET_RADIUS;
}

async function main(){
try{
  const renderer = new THREE.WebGPURenderer({antialias:false});
  await renderer.init();
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);
  log('Renderer OK');

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x03040a);
  const walkCamera = new THREE.PerspectiveCamera(65, window.innerWidth/window.innerHeight, 0.05, 500);
  const orbitCamera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.5, 2000);
  orbitCamera.position.set(0, 60, 160);
  const orbitControls = new OrbitControls(orbitCamera, renderer.domElement);
  orbitControls.enableDamping = true;
  orbitControls.minDistance = 40;
  orbitControls.maxDistance = 700;
  orbitControls.target.set(0,0,0);

  const tidesCamera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.5, 2000);
  tidesCamera.position.set(0, 45, 95);
  const tidesControls = new OrbitControls(tidesCamera, renderer.domElement);
  tidesControls.enableDamping = true;
  tidesControls.minDistance = 30;
  tidesControls.maxDistance = 400;
  tidesControls.target.set(0,0,0);

  let activeCamera = walkCamera;
  let currentTab = 'walk';

  {
    const N=2000, pos=new Float32Array(N*3);
    for(let i=0;i<N;i++){
      const r=180+Math.random()*40, th=Math.random()*Math.PI*2, ph=Math.acos(2*Math.random()-1);
      pos[i*3]=r*Math.sin(ph)*Math.cos(th); pos[i*3+1]=r*Math.sin(ph)*Math.sin(th); pos[i*3+2]=r*Math.cos(ph);
    }
    const starGeo=new THREE.BufferGeometry();
    starGeo.setAttribute('position', new THREE.BufferAttribute(pos,3));
    scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({size:0.6,color:0xffffff})));
  }

  const sun = new THREE.DirectionalLight(0xfff2e0, 3.2);
  sun.position.set(60,40,30);
  scene.add(sun);
  scene.add(new THREE.AmbientLight(0x304050, 0.55));

  const N = 46;
  const GRID = N+1;
  const HALF = PLANET_RADIUS*1.35;
  const CELL = (HALF*2)/N;
  const numPoints = GRID*GRID*GRID;
  const numCells = N*N*N;
  const MAX_TRIS_PER_CELL = 5;
  const maxVerts = numCells*MAX_TRIS_PER_CELL*3;
  log('Terrain grid '+GRID+'^3, '+numCells+' cells, maxVerts='+maxVerts);

  const densityBuf = new THREE.StorageInstancedBufferAttribute(numPoints, 1);
  const densityNode = storage(densityBuf, 'float', numPoints);
  const triTableFlat = new Int32Array(256*16);
  TriangleTable.forEach((row,i)=>{ for(let j=0;j<16;j++) triTableFlat[i*16+j]=row[j]; });
  const triTableAttr = new THREE.StorageBufferAttribute(triTableFlat, 1);
  const triTableStorage = storage(triTableAttr, 'int', 256*16);

  const vertexBuf = new THREE.StorageBufferAttribute(maxVerts, 3);
  const vertexNode = storage(vertexBuf, 'vec3', maxVerts);
  const normalBuf = new THREE.StorageBufferAttribute(maxVerts, 3);
  const normalNode = storage(normalBuf, 'vec3', maxVerts);
  const colorBuf = new THREE.StorageBufferAttribute(maxVerts, 3);
  const colorNode = storage(colorBuf, 'vec3', maxVerts);
  log('Buffers allocated');

  const densityFn = Fn(()=>{
    const idx = instanceIndex;
    const gz = idx.div(uint(GRID*GRID));
    const rem = idx.mod(uint(GRID*GRID));
    const gy = rem.div(uint(GRID));
    const gx = rem.mod(uint(GRID));
    const p = vec3(gx.toFloat().mul(CELL).sub(HALF), gy.toFloat().mul(CELL).sub(HALF), gz.toFloat().mul(CELL).sub(HALF));
    const dir = p.normalize();
    const base = p.length().sub(PLANET_RADIUS);
    const n1 = mx_fractal_noise_float(dir.mul(2.3), 5, 2.0, 0.5);
    const ridge = float(1.0).sub(n1.abs());
    const n2 = mx_fractal_noise_float(dir.mul(6.9).add(vec3(9.1,2.3,4.7)), 3, 2.0, 0.5);
    const billow = n2.abs();
    const terrain = ridge.mul(ridge).mul(0.9).sub(billow.mul(0.35));

    // ── Craters, via Worley (cellular) noise. mx_worley_noise_float
    // returns something distance-like from each point to its nearest
    // random cell center - small right at a center, growing away from
    // it. Using exp(-w^2 * k) turns that into a Gaussian bowl profile
    // that's robust regardless of this implementation's exact output
    // scale (no need to know its precise numeric range, just that it's
    // ~0 at centers and grows outward). A second, larger-scale Worley
    // layer gives bigger/rarer craters than the first, same idea two
    // asteroid-belt games use to mix crater sizes.
    const w1 = mx_worley_noise_float(dir.mul(4.2));
    const profile1 = exp(w1.mul(w1).mul(-22.0));
    const w2 = mx_worley_noise_float(dir.mul(1.6).add(vec3(31.0,7.0,19.0)));
    const profile2 = exp(w2.mul(w2).mul(-38.0));
    const bowl = profile1.mul(0.22).add(profile2.mul(0.55));
    const rim1 = smoothstep(0.04,0.22,profile1).sub(smoothstep(0.22,0.42,profile1)).mul(0.06);
    const rim2 = smoothstep(0.03,0.18,profile2).sub(smoothstep(0.18,0.34,profile2)).mul(0.14);
    const craterRim = rim1.add(rim2);

    densityNode.element(idx).assign(base.sub(terrain.mul(1.4)).add(bowl).sub(craterRim));
  });
  await renderer.computeAsync(densityFn().compute(numPoints));
  log('Density pass OK');

  densityGridInfo = { GRID, CELL, HALF };
  const densityArrBuf = await renderer.getArrayBufferAsync(densityBuf);
  densityArray = new Float32Array(densityArrBuf);
  log('Density readback for collision OK ('+densityArray.length+' samples) - collision now pixel-consistent with the rendered mesh, craters included');

  const mcFn = Fn(()=>{
    const cellIdx = instanceIndex;
    const cz = cellIdx.div(uint(N*N));
    const crem = cellIdx.mod(uint(N*N));
    const cy = crem.div(uint(N));
    const cx = crem.mod(uint(N));

    const readCorner = (i)=>{
      const dx=i&1, dy=(i>>1)&1, dz=(i>>2)&1;
      const gx=cx.add(dx), gy=cy.add(dy), gz=cz.add(dz);
      const flat = gx.add(gy.mul(uint(GRID))).add(gz.mul(uint(GRID*GRID)));
      return {
        pos: vec3(gx.toFloat().mul(CELL).sub(HALF), gy.toFloat().mul(CELL).sub(HALF), gz.toFloat().mul(CELL).sub(HALF)),
        density: densityNode.element(flat),
      };
    };
    const c0=readCorner(0),c1=readCorner(1),c2=readCorner(2),c3=readCorner(3),
          c4=readCorner(4),c5=readCorner(5),c6=readCorner(6),c7=readCorner(7);
    const corners=[c0,c1,c2,c3,c4,c5,c6,c7];

    const caseIdx = int(0).toVar();
    corners.forEach((c,i)=>{
      If(c.density.lessThan(0.0), ()=>{ caseIdx.assign(caseIdx.bitOr(int(1<<i))); });
    });

    const outBase = cellIdx.mul(uint(MAX_TRIS_PER_CELL*3));
    Loop(MAX_TRIS_PER_CELL*3, ({i})=>{
      vertexNode.element(outBase.add(uint(i))).assign(vec3(0,0,0));
      normalNode.element(outBase.add(uint(i))).assign(vec3(0,1,0));
      colorNode.element(outBase.add(uint(i))).assign(vec3(0,0,0));
    });

    Loop(MAX_TRIS_PER_CELL, ({i})=>{
      const triBase = caseIdx.mul(int(16)).add(i.mul(3));
      const e0 = triTableStorage.element(triBase);
      If(e0.greaterThanEqual(0), ()=>{
        const e1 = triTableStorage.element(triBase.add(1));
        const e2 = triTableStorage.element(triBase.add(2));

        const interp = (edge)=>{
          let pa=corners[0].pos, pb=corners[0].pos, da=corners[0].density, db=corners[0].density;
          EdgeVertexIndices.forEach(([va,vb],k)=>{
            const match = edge.equal(int(k));
            pa = select(match, corners[va].pos, pa);
            pb = select(match, corners[vb].pos, pb);
            da = select(match, corners[va].density, da);
            db = select(match, corners[vb].density, db);
          });
          const t = da.div(da.sub(db).add(1e-6));
          return pa.add(pb.sub(pa).mul(t));
        };

        const v0=interp(e0), v1=interp(e1), v2=interp(e2);
        const nrm = v1.sub(v0).cross(v2.sub(v0)).normalize();

        const colorFor = (v)=>{
          const r = v.length();
          const height = r.sub(PLANET_RADIUS);
          const up = v.normalize();
          const slope = float(1.0).sub(nrm.dot(up).clamp(0.0,1.0));
          const rock = vec3(0.42,0.38,0.34);
          const sand = vec3(0.76,0.68,0.48);
          const grass = vec3(0.28,0.46,0.22);
          const snow = vec3(0.92,0.94,0.97);
          let c = mix(sand, grass, height.add(0.3).div(0.6).clamp(0.0,1.0));
          c = mix(c, rock, slope.smoothstep(0.35,0.75));
          c = mix(c, snow, height.sub(0.65).div(0.3).clamp(0.0,1.0));
          return c;
        };
        const col = colorFor(v0).add(colorFor(v1)).add(colorFor(v2)).div(3.0);

        const slot = i.mul(3);
        vertexNode.element(outBase.add(slot)).assign(v0);
        vertexNode.element(outBase.add(slot).add(1)).assign(v1);
        vertexNode.element(outBase.add(slot).add(2)).assign(v2);
        normalNode.element(outBase.add(slot)).assign(nrm);
        normalNode.element(outBase.add(slot).add(1)).assign(nrm);
        normalNode.element(outBase.add(slot).add(2)).assign(nrm);
        colorNode.element(outBase.add(slot)).assign(col);
        colorNode.element(outBase.add(slot).add(1)).assign(col);
        colorNode.element(outBase.add(slot).add(2)).assign(col);
      });
    });
  });
  await renderer.computeAsync(mcFn().compute(numCells));
  log('Marching cubes + biome color pass OK');

  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', vertexBuf);
  geometry.setAttribute('normal', normalBuf);
  geometry.setAttribute('color', colorBuf);
  geometry.boundingSphere = new THREE.Sphere(new THREE.Vector3(0,0,0), HALF*1.5);
  const material = new THREE.MeshStandardMaterial({ vertexColors:true, roughness:0.92, metalness:0.02, side:THREE.DoubleSide });
  const terrainMesh = new THREE.Mesh(geometry, material);
  scene.add(terrainMesh);
  log('Terrain mesh added');

  // ── Water: depth-aware shading. The terrain (opaque) renders first
  // in the same frame, so by the time this transparent water fragment
  // shades, viewportLinearDepth already holds "whatever's behind me" -
  // comparing that to this fragment's own depth gives the water column
  // thickness at each point, which drives color/opacity (shallow near
  // shore = lighter/more see-through, deep = darker/more opaque),
  // shoreline foam (thickness near zero), and it's all recomputed live
  // if the terrain changes, no separate baked mask needed.
  const waterGeo = new THREE.SphereGeometry(PLANET_RADIUS+0.02, 120, 80);
  const waterMat = new THREE.MeshStandardNodeMaterial({
    transparent:true, side:THREE.DoubleSide, depthWrite:false, metalness:0.05,
  });

  const sceneDepth = viewportLinearDepth;
  const surfaceDepth = linearDepth(positionView.z);
  const depthDiff = sceneDepth.sub(surfaceDepth).max(0.0);
  // Real bug found: this was scaled by 60x, which saturates the shallow-
  // to-deep gradient almost immediately (a water column just 0.02 units
  // thick already reads as maximally "deep") given this planet's terrain
  // varies by only a couple of units - nearly everything looked like the
  // same dark deep-water color instead of a real gradient. Terrain
  // height variance here is roughly +/-2 units, so a water column is
  // typically 0-2 units deep; scaling by ~3 keeps the visible shallow-
  // to-deep transition spread across that actual range instead of
  // collapsing it into the first few centimeters.
  const depthFactor = depthDiff.mul(3.2).clamp(0.0, 1.0);

  const shallowColor = vec3(0.34, 0.76, 0.72);
  const midColor = vec3(0.10, 0.45, 0.52);
  const deepColor = vec3(0.02, 0.09, 0.20);
  const baseColor = mix(mix(shallowColor, midColor, smoothstep(0.0,0.45,depthFactor)), deepColor, smoothstep(0.35,1.0,depthFactor));

  // Shoreline foam: a thin band where depth-into-water is near zero,
  // broken up with noise so it's not a uniform ring.
  const foam = float(1.0).sub(smoothstep(0.0, 0.05, depthDiff));
  const foamNoise = mx_fractal_noise_float(positionWorld.mul(8.0).add(vec3(time.mul(0.3),0,time.mul(0.2))), 3, 2.0, 0.5);
  const foamMask = foam.mul(smoothstep(0.15, 0.6, foamNoise.mul(0.5).add(0.5)).add(0.35).clamp(0.0,1.0));

  // Multi-octave wave normal: two large rolling-swell layers (as before)
  // plus a third smaller/faster layer for fine ripple detail, so the
  // surface reads as textured water rather than a smooth tinted glass
  // sphere with one repeating bump frequency.
  const wavePos = positionWorld.mul(2.6).add(vec3(time.mul(0.15), 0.0, time.mul(0.11)));
  const waveN = mx_fractal_noise_float(wavePos, 4, 2.0, 0.5);
  const wavePos2 = positionWorld.mul(2.6).add(vec3(time.mul(0.11).add(50.0), 0.0, time.mul(-0.13)));
  const waveN2 = mx_fractal_noise_float(wavePos2, 4, 2.0, 0.5);
  const wavePos3 = positionWorld.mul(9.0).add(vec3(time.mul(0.4).add(12.0), 0.0, time.mul(0.33)));
  const waveN3 = mx_fractal_noise_float(wavePos3, 2, 2.0, 0.5);
  const waveNormal = tslNormalize(normalWorld.add(vec3(
    waveN.mul(0.12).add(waveN3.mul(0.035)),
    waveN2.mul(0.12).add(waveN3.mul(0.035)),
    waveN.mul(waveN2).mul(0.08)
  )));

  // Fresnel-based shine at grazing angles - the actual "light breaking
  // up unevenly across the surface, not one flat specular patch" effect
  // described: combined with the wave-perturbed normal above, the angle
  // (and therefore the brightness) varies continuously across the
  // surface instead of being symmetrical.
  const viewDirWater = positionWorld.sub(cameraPosition).normalize();
  const fresnelWater = float(1.0).sub(viewDirWater.dot(waveNormal).abs()).pow(2.5);
  const shine = fresnelWater.mul(0.55);

  waterMat.colorNode = mix(baseColor, vec3(1,1,1), foamMask).add(vec3(0.55,0.65,0.75).mul(shine));
  waterMat.opacityNode = clamp(float(0.4).add(depthFactor.mul(0.5)).add(foamMask.mul(0.4)).add(shine.mul(0.3)), 0.0, 0.97);
  waterMat.normalNode = waveNormal;
  // Roughness modulated by the same wave noise, so specular highlights
  // themselves break up across the surface instead of one uniform shine.
  waterMat.roughnessNode = clamp(float(0.06).add(waveN3.abs().mul(0.12)), 0.03, 0.28);

  const waterMesh = new THREE.Mesh(waterGeo, waterMat);
  scene.add(waterMesh);
  log('Water sphere added (depth-aware, animated waves, shoreline foam)');

  // ── Atmosphere: real ray-marched Rayleigh scattering, per the
  // confirmed technique from the reference video - not a Fresnel-glow
  // approximation. For each atmosphere-shell fragment: march a primary
  // ray from the camera through the atmosphere (stopping at either the
  // outer atmosphere boundary or the planet's actual surface, found via
  // an independent depth pre-pass); at each sample point along that
  // ray, march a SECOND ray toward the sun to find how much atmosphere
  // sunlight already passed through to reach that point (its optical
  // depth). Density falls off exponentially with altitude. Per-
  // wavelength scattering strength is proportional to 1/wavelength^4
  // (real Rayleigh scattering physics - why the sky is blue and sunsets
  // are red: shorter wavelengths scatter far more than longer ones),
  // and light accumulates along the view ray weighted by how much has
  // already been extinguished (transmittance) up to that point.
  const atmoDepthTarget = new THREE.RenderTarget(window.innerWidth, window.innerHeight);
  atmoDepthTarget.depthTexture = new THREE.DepthTexture();
  atmoDepthTarget.depthTexture.type = THREE.FloatType;

  const ATMO_RADIUS = HALF*1.06;
  const DENSITY_FALLOFF = 5.5;
  const VIEW_SAMPLES = 10;
  const SUN_SAMPLES = 5;
  // Wavelengths in nm -> scattering coefficient per channel, following
  // 1/wavelength^4 (real red/green/blue ~700/530/440nm), scaled by
  // /400 first per the reference so the numbers land somewhere
  // workable instead of a tiny fraction, then a tunable strength.
  const wl = (nm)=> Math.pow(400/nm, 4);
  const SCATTER_STRENGTH = 2.2;
  const scatterCoeffsVal = new THREE.Vector3(wl(700), wl(530), wl(440)).multiplyScalar(SCATTER_STRENGTH);
  const scatterCoeffs = uniform(scatterCoeffsVal);

  // The sun's current world-space direction, refreshed every frame from
  // the animated DirectionalLight - a uniform, not baked into the graph,
  // since the sun actually moves (day/night cycle).
  const sunDirUniform = uniform(new THREE.Vector3(1,0,0));
  const atmoDebugUniform = uniform(0); // set via window.ATMO_DEBUG = true/false at runtime

  // Ray-sphere intersection: returns vec3(distToSphere, distThroughSphere,
  // hitFlag). hitFlag is 0 if the ray misses the sphere entirely.
  const raySphere = Fn(([sphereCenter, sphereRadius, rayOrigin, rayDir])=>{
    const offset = rayOrigin.sub(sphereCenter);
    const b = offset.dot(rayDir).mul(2.0);
    const c = offset.dot(offset).sub(sphereRadius.mul(sphereRadius));
    const disc = b.mul(b).sub(c.mul(4.0));
    const result = vec3(0,0,0).toVar();
    If(disc.greaterThanEqual(0.0), ()=>{
      const s = disc.sqrt();
      const near = b.negate().sub(s).div(2.0);
      const far = b.negate().add(s).div(2.0);
      If(far.greaterThanEqual(0.0), ()=>{
        const dToSphere = near.max(0.0);
        result.assign(vec3(dToSphere, far.sub(dToSphere), 1.0));
      });
    });
    return result;
  });

  const densityAtPoint = Fn(([samplePoint])=>{
    const height = samplePoint.length().sub(PLANET_RADIUS);
    const h01 = height.div(ATMO_RADIUS-PLANET_RADIUS).clamp(0.0,1.0);
    return exp(h01.negate().mul(DENSITY_FALLOFF)).mul(float(1.0).sub(h01));
  });

  const opticalDepth = Fn(([rayOrigin, rayDir, rayLength])=>{
    const stepSize = rayLength.div(SUN_SAMPLES);
    const p = rayOrigin.toVar();
    const total = float(0).toVar();
    Loop(SUN_SAMPLES, ()=>{
      total.addAssign(densityAtPoint(p).mul(stepSize));
      p.addAssign(rayDir.mul(stepSize));
    });
    return total;
  });

  const atmoMat = new THREE.MeshBasicNodeMaterial({ transparent:true, side:THREE.BackSide, depthWrite:false, blending:THREE.AdditiveBlending });

  const atmosphereFn = Fn(()=>{
    const camRayOrigin = cameraPosition;
    const rayDirAtmo = positionWorld.sub(cameraPosition).normalize();
    const planetCenter = vec3(0,0,0);
    const hit = raySphere(planetCenter, float(ATMO_RADIUS), camRayOrigin, rayDirAtmo);

    // How far along this ray the real planet surface is, from the
    // independent depth pre-pass - the primary march must stop there
    // rather than continuing through solid ground.
    const atmoDepthNode = texture(atmoDepthTarget.depthTexture, screenUV);
    const surfaceViewZ = perspectiveDepthToViewZ(atmoDepthNode.r, cameraNear, cameraFar);
    const surfaceDist = surfaceViewZ.negate();

  const marchStart = hit.x;
  const surfaceClampActive = surfaceDist.sub(marchStart).lessThan(hit.y); // true where the solid surface is actually cutting the march short
  const marchLen = hit.y.min(surfaceDist.sub(marchStart).max(0.0));

  // Debug visualization: window.ATMO_DEBUG = true recolors the effect
  // solid red wherever the depth clamp is genuinely limiting the ray
  // (i.e., 'a solid surface is correctly in the way here') vs the
  // normal scattering color where it's not (limb of the planet, open
  // space) — makes the actual clamp behavior directly visible instead
  // of only inferable from reading the shader code.
  const inScatter = vec3(0,0,0).toVar();
  If(hit.z.greaterThan(0.5), ()=>{
      const stepSize = marchLen.div(VIEW_SAMPLES);
      const p = camRayOrigin.add(rayDirAtmo.mul(marchStart)).toVar();
      const viewOpticalDepth = float(0).toVar();
      Loop(VIEW_SAMPLES, ()=>{
        const localDensity = densityAtPoint(p);
        viewOpticalDepth.addAssign(localDensity.mul(stepSize));

        // Sun ray from this sample point out to the atmosphere edge.
        const sunHit = raySphere(planetCenter, float(ATMO_RADIUS), p, sunDirUniform);
        const sunOpticalDepth = opticalDepth(p, sunDirUniform, sunHit.y);

        const transmittance = exp(scatterCoeffs.negate().mul(sunOpticalDepth.add(viewOpticalDepth)));
        inScatter.addAssign(localDensity.mul(transmittance).mul(scatterCoeffs).mul(stepSize));
        p.addAssign(rayDirAtmo.mul(stepSize));
      });
    });
    const debugColor = mix(inScatter, vec3(1,0,0), atmoDebugUniform.mul(select(surfaceClampActive,1.0,0.0)));
    return debugColor;
  });

  const atmoInScatter = atmosphereFn();
  atmoMat.colorNode = atmoInScatter;
  atmoMat.opacityNode = clamp(atmoInScatter.r.add(atmoInScatter.g).add(atmoInScatter.b).mul(0.6), 0.0, 1.0);
  const atmoGeo = new THREE.SphereGeometry(ATMO_RADIUS, 64, 40);
  const atmoMesh = new THREE.Mesh(atmoGeo, atmoMat);
  scene.add(atmoMesh);
  log('Atmosphere shell added (real ray-marched Rayleigh scattering, '+VIEW_SAMPLES+'x'+SUN_SAMPLES+' samples)');

  const startDir = new THREE.Vector3(0.3,0.85,0.3).normalize();
  const player = {
    pos: startDir.clone().multiplyScalar(groundRadiusAt(startDir.x,startDir.y,startDir.z)+1.8),
    vel: new THREE.Vector3(),
    yaw: 0, pitch: -0.15,
    onGround: false,
  };
  const keys = {};
  window.addEventListener('keydown', e=>keys[e.code]=true);
  window.addEventListener('keyup', e=>keys[e.code]=false);
  let pointerLocked = false;
  renderer.domElement.addEventListener('click', ()=>renderer.domElement.requestPointerLock());
  document.addEventListener('pointerlockchange', ()=>{ pointerLocked = document.pointerLockElement===renderer.domElement; });
  document.addEventListener('mousemove', e=>{
    if(!pointerLocked) return;
    player.yaw -= e.movementX*0.0025;
    player.pitch = Math.max(-1.4, Math.min(1.4, player.pitch - e.movementY*0.0025));
  });

  // ── Touch joysticks (tablet/no-keyboard support) ─────────────────
  // Real bug avoided here: touch coordinates must be tracked per
  // touch.identifier, not just "the last touch," or a second finger
  // (e.g. look-stick while move-stick is still held) steals the first
  // finger's drag state and both sticks jump around.
  const joyMove = { x:0, y:0 };
  const joyLook = { dx:0, dy:0 };
  function setupJoystick(zoneId, stickId, onMove, onEnd){
    const zone = document.getElementById(zoneId);
    const stick = document.getElementById(stickId);
    let touchId = null, cx=0, cy=0;
    const radius = 66;
    function start(e){
      const t = e.changedTouches[0];
      touchId = t.identifier;
      const rect = zone.getBoundingClientRect();
      cx = rect.left+rect.width/2; cy = rect.top+rect.height/2;
      e.preventDefault();
    }
    function move(e){
      for(const t of e.changedTouches){
        if(t.identifier!==touchId) continue;
        let dx=t.clientX-cx, dy=t.clientY-cy;
        const len=Math.hypot(dx,dy);
        if(len>radius){ dx=dx/len*radius; dy=dy/len*radius; }
        stick.style.transform = `translate(${dx}px,${dy}px)`;
        onMove(dx/radius, dy/radius);
        e.preventDefault();
      }
    }
    function end(e){
      for(const t of e.changedTouches){
        if(t.identifier!==touchId) continue;
        touchId=null;
        stick.style.transform = '';
        onEnd();
      }
    }
    zone.addEventListener('touchstart', start, {passive:false});
    zone.addEventListener('touchmove', move, {passive:false});
    zone.addEventListener('touchend', end, {passive:false});
    zone.addEventListener('touchcancel', end, {passive:false});
  }
  setupJoystick('joy-look','joy-look-stick',
    (nx,ny)=>{ joyLook.dx=nx; joyLook.dy=ny; },
    ()=>{ joyLook.dx=0; joyLook.dy=0; });
  setupJoystick('joy-move','joy-move-stick',
    (nx,ny)=>{ joyMove.x=nx; joyMove.y=ny; },
    ()=>{ joyMove.x=0; joyMove.y=0; });

  // Real bug found: jumpHeld was set true on touchstart and false on
  // touchend - a quick tap can fire both of those within the same
  // ~16ms window between two animation frames, so updatePlayer() would
  // never actually see it as true even though the tap clearly happened
  // (this is exactly the "I'm tapping here but it's doing nothing" and
  // the "jumping and stuttering" symptoms - the rare frame where it WAS
  // seen as true could line up with a mid-air onGround flicker). Fixed
  // with an edge-triggered queued flag: touchstart queues a jump,
  // updatePlayer() consumes and clears it next frame regardless of how
  // briefly the button was actually held.
  let jumpQueued = false;
  const jumpBtn = document.getElementById('jump-btn');
  jumpBtn.addEventListener('touchstart', e=>{ jumpQueued=true; e.preventDefault(); }, {passive:false});
  jumpBtn.addEventListener('touchend', e=>{ e.preventDefault(); }, {passive:false});
  window.addEventListener('keydown', e=>{ if(e.code==='Space') jumpQueued=true; });

  const GRAVITY = 9.0;
  const MOVE_SPEED = 4.5;
  const JUMP_SPEED = 5.2;
  const tmpUp = new THREE.Vector3(), tmpFwd = new THREE.Vector3(), tmpRight = new THREE.Vector3();
  const qYaw = new THREE.Quaternion(), qPitch = new THREE.Quaternion();

  function updatePlayer(dt){
    // Look-stick applies a continuous rotation rate (it's a joystick,
    // not a mouse-delta) — proportional to how far it's pushed.
    player.yaw -= joyLook.dx*dt*2.4;
    player.pitch = Math.max(-1.4, Math.min(1.4, player.pitch - joyLook.dy*dt*2.4));

    const dir = player.pos.clone().normalize();
    tmpUp.copy(dir);

    const worldFwdRef = Math.abs(tmpUp.y) < 0.99 ? new THREE.Vector3(0,1,0) : new THREE.Vector3(1,0,0);
    tmpRight.crossVectors(worldFwdRef, tmpUp).normalize();
    tmpFwd.crossVectors(tmpUp, tmpRight).normalize();
    qYaw.setFromAxisAngle(tmpUp, player.yaw);
    const fwd = tmpFwd.clone().applyQuaternion(qYaw);
    const right = tmpRight.clone().applyQuaternion(qYaw);

    let moveX=0, moveZ=0;
    if(keys['KeyW']) moveZ+=1; if(keys['KeyS']) moveZ-=1;
    if(keys['KeyD']) moveX+=1; if(keys['KeyA']) moveX-=1;
    moveX += joyMove.x; moveZ -= joyMove.y; // joystick y is screen-down-positive, forward is up-on-stick
    const moveVec = new THREE.Vector3().addScaledVector(fwd,moveZ).addScaledVector(right,moveX);
    if(moveVec.lengthSq()>1) moveVec.normalize();
    moveVec.multiplyScalar(MOVE_SPEED);

    player.vel.addScaledVector(tmpUp, -GRAVITY*dt);
    player.vel.copy(moveVec).addScaledVector(tmpUp, player.vel.dot(tmpUp));

    if(jumpQueued && player.onGround){
      jumpQueued = false;
      player.vel.addScaledVector(tmpUp, JUMP_SPEED);
      player.onGround = false;
    }

    player.pos.addScaledVector(player.vel, dt);
    const newLen = player.pos.length();
    const newDir = player.pos.clone().divideScalar(newLen);
    const newGroundR = groundRadiusAt(newDir.x,newDir.y,newDir.z);
    const eyeHeight = 1.8;
    if(newLen < newGroundR+eyeHeight){
      player.pos.copy(newDir).multiplyScalar(newGroundR+eyeHeight);
      player.vel.addScaledVector(newDir, -player.vel.dot(newDir));
      player.onGround = true;
    } else {
      player.onGround = false;
    }
  }

  function updateCamera(){
    const dir = player.pos.clone().normalize();
    walkCamera.position.copy(player.pos);
    const worldFwdRef = Math.abs(dir.y) < 0.99 ? new THREE.Vector3(0,1,0) : new THREE.Vector3(1,0,0);
    const right = new THREE.Vector3().crossVectors(worldFwdRef, dir).normalize();
    const fwd = new THREE.Vector3().crossVectors(dir, right).normalize();
    qYaw.setFromAxisAngle(dir, player.yaw);
    qPitch.setFromAxisAngle(right.clone().applyQuaternion(qYaw), player.pitch);
    const lookDir = fwd.clone().applyQuaternion(qYaw).applyQuaternion(qPitch);
    walkCamera.up.copy(dir);
    walkCamera.lookAt(walkCamera.position.clone().add(lookDir));
  }

  log('Character controller ready (small-planet walker)');

  // ── Tides tab: real per-frame SPH fluid simulation with a genuinely
  // orbiting moon, added into this SAME scene (reusing PLANET_RADIUS and
  // the terrain's own noise functions rather than duplicating a second
  // copy) - only the camera/controls differ between tabs, not the
  // underlying world. The smooth depth-shaded water sphere and the
  // discrete SPH particles are two different representations of "the
  // ocean" and would look redundant/cluttered shown together, so each
  // tab shows only the one that matches what it's demonstrating.
  const MOON_ORBIT_RADIUS = 70;
  const MOON_RADIUS = 4.5;
  const moonMesh = new THREE.Mesh(new THREE.SphereGeometry(MOON_RADIUS,32,24), new THREE.MeshStandardMaterial({color:0xaaaaaa, roughness:1.0}));
  scene.add(moonMesh);
  const moonPosUniform = uniform(new THREE.Vector3(MOON_ORBIT_RADIUS,0,0));

  const N_PARTICLES = 1400;
  const SMOOTHING_RADIUS = 1.6;
  const REST_DENSITY = 2.0;
  const PRESSURE_STIFFNESS = 4.0;
  const VISCOSITY = 0.25;
  const PARTICLE_MASS = 1.0;
  const GRAVITY_STRENGTH = 9.0;
  const MOON_MASS_STRENGTH = 620.0; // tuned for a visible bulge at this scale, not real astronomical units

  const tidePosBuf = new THREE.StorageBufferAttribute(N_PARTICLES, 3);
  const tideVelBuf = new THREE.StorageBufferAttribute(N_PARTICLES, 3);
  const tideDensityBuf = new THREE.StorageInstancedBufferAttribute(N_PARTICLES, 1);
  const tidePosNode = storage(tidePosBuf, 'vec3', N_PARTICLES);
  const tideVelNode = storage(tideVelBuf, 'vec3', N_PARTICLES);
  const tideDensityNode = storage(tideDensityBuf, 'float', N_PARTICLES);

  {
    const initArr = new Float32Array(N_PARTICLES*3);
    for(let i=0;i<N_PARTICLES;i++){
      const th=Math.random()*Math.PI*2, ph=Math.acos(2*Math.random()-1);
      const dir=new THREE.Vector3(Math.sin(ph)*Math.cos(th),Math.sin(ph)*Math.sin(th),Math.cos(ph));
      const r = PLANET_RADIUS + 0.05 + Math.random()*0.15;
      initArr[i*3]=dir.x*r; initArr[i*3+1]=dir.y*r; initArr[i*3+2]=dir.z*r;
    }
    tidePosBuf.array.set(initArr);
    tidePosBuf.needsUpdate = true;
  }

  const poly6 = Fn(([distSq, h])=>{
    const hSq = h.mul(h);
    const diff = hSq.sub(distSq).max(0.0);
    const norm = float(315.0).div(float(64.0).mul(Math.PI).mul(h.pow(9)));
    return norm.mul(diff.mul(diff).mul(diff));
  });
  const spikyGrad = Fn(([dist, h])=>{
    const diff = h.sub(dist).max(0.0);
    const norm = float(-45.0).div(Math.PI).div(h.pow(6));
    return norm.mul(diff).mul(diff);
  });

  const tideComputeDensity = Fn(()=>{
    const i = instanceIndex;
    const pi = tidePosNode.element(i);
    const total = float(0).toVar();
    Loop(N_PARTICLES, ({i:j})=>{
      const pj = tidePosNode.element(uint(j));
      const d = pi.distance(pj);
      total.addAssign(poly6(d.mul(d), float(SMOOTHING_RADIUS)).mul(PARTICLE_MASS));
    });
    tideDensityNode.element(i).assign(total);
  });

  const tideComputeForces = Fn(()=>{
    const i = instanceIndex;
    const pi = tidePosNode.element(i).toVar();
    const vi = tideVelNode.element(i).toVar();
    const rhoI = tideDensityNode.element(i);
    const pressureI = rhoI.sub(REST_DENSITY).max(0.0).mul(PRESSURE_STIFFNESS);

    const force = vec3(0,0,0).toVar();
    Loop(N_PARTICLES, ({i:j})=>{
      If(uint(j).notEqual(i), ()=>{
        const pj = tidePosNode.element(uint(j));
        const vj = tideVelNode.element(uint(j));
        const rhoJ = tideDensityNode.element(uint(j)).max(0.0001);
        const diff = pi.sub(pj);
        const dist = diff.length().max(0.0001);
        If(dist.lessThan(float(SMOOTHING_RADIUS)), ()=>{
          const dir = diff.div(dist);
          const pressureJ = rhoJ.sub(REST_DENSITY).max(0.0).mul(PRESSURE_STIFFNESS);
          const pressureForce = dir.mul(pressureI.add(pressureJ).mul(0.5).mul(spikyGrad(dist, float(SMOOTHING_RADIUS))).div(rhoJ));
          force.subAssign(pressureForce);
          force.addAssign(vj.sub(vi).mul(VISCOSITY).div(rhoJ));
        });
      });
    });

    const toCenter = pi.negate();
    const distCenter = toCenter.length().max(0.01);
    force.addAssign(toCenter.div(distCenter).mul(GRAVITY_STRENGTH));

    const toMoon = moonPosUniform.sub(pi);
    const distMoon = toMoon.length().max(0.01);
    force.addAssign(toMoon.div(distMoon).mul(MOON_MASS_STRENGTH).div(distMoon.mul(distMoon)));

    const dt = float(0.016);
    const newVel = vi.add(force.mul(dt));
    const newPos = pi.add(newVel.mul(dt));

    const dir = tslNormalize(newPos);
    const r = newPos.length();
    const floorR = float(PLANET_RADIUS - 0.2);
    const belowFloor = r.lessThan(floorR);
    const correctedPos = mix(newPos, dir.mul(floorR), belowFloor);
    const correctedVel = mix(newVel, newVel.sub(dir.mul(newVel.dot(dir)).mul(1.4)), belowFloor);

    tidePosNode.element(i).assign(correctedPos);
    tideVelNode.element(i).assign(correctedVel);
  });

  const tideDensityPass = tideComputeDensity().compute(N_PARTICLES);
  const tideForcePass = tideComputeForces().compute(N_PARTICLES);

  const tideParticleGeo = new THREE.BufferGeometry();
  tideParticleGeo.setAttribute('position', tidePosBuf);
  tideParticleGeo.boundingSphere = new THREE.Sphere(new THREE.Vector3(0,0,0), PLANET_RADIUS*1.5);
  const tideParticleMat = new THREE.PointsNodeMaterial({ color:0x3fa8d8, size:0.35, transparent:true, opacity:0.85 });
  const tideParticles = new THREE.Points(tideParticleGeo, tideParticleMat);
  scene.add(tideParticles);
  moonMesh.visible = false; tideParticles.visible = false;
  log('Tides: SPH ocean ('+N_PARTICLES+' particles) + orbiting moon added');


  // ── Tab switching: WALK uses the first-person character-controller
  // camera and (on touch devices) the joysticks/jump button; ORBIT uses
  // a free-flying OrbitControls camera pulled back far enough to see
  // the whole planet, its atmosphere, and the starfield around it;
  // TIDES swaps in the SPH ocean particles + orbiting moon in place of
  // the smooth water sphere (showing both at once would be redundant -
  // they're two different representations of "the ocean"). All three
  // tabs render the exact same terrain/atmosphere - switching just
  // changes which camera is active and which ocean representation (and,
  // for TIDES, whether the fluid sim is actually being stepped - no
  // sense spending compute on particles nobody's looking at).
  const walkOnlyEls = [document.getElementById('joy-move'), document.getElementById('joy-look'), document.getElementById('jump-btn')];
  function setTab(tab){
    currentTab = tab;
    activeCamera = (tab==='walk') ? walkCamera : (tab==='orbit') ? orbitCamera : tidesCamera;
    document.getElementById('tab-walk-btn').classList.toggle('active', tab==='walk');
    document.getElementById('tab-orbit-btn').classList.toggle('active', tab==='orbit');
    document.getElementById('tab-tides-btn').classList.toggle('active', tab==='tides');
    document.getElementById('hint').style.display = (tab==='walk') ? 'block' : 'none';
    document.getElementById('crosshair').style.display = (tab==='walk') ? 'block' : 'none';
    if(tab==='walk' && hasTouch){
      walkOnlyEls.forEach(el=>{ if(el) el.style.display = (el.id==='jump-btn') ? 'flex' : 'block'; });
    } else {
      walkOnlyEls.forEach(el=>{ if(el) el.style.display = 'none'; });
    }
    moonMesh.visible = (tab==='tides');
    tideParticles.visible = (tab==='tides');
    waterMesh.visible = (tab!=='tides');
  }
  document.getElementById('tab-walk-btn').addEventListener('click', ()=>setTab('walk'));
  document.getElementById('tab-orbit-btn').addEventListener('click', ()=>setTab('orbit'));
  document.getElementById('tab-tides-btn').addEventListener('click', ()=>setTab('tides'));
  setTab('walk');
  log('READY');

  let last = performance.now();
  let frameCount=0, loggedFirst=false;
  let sunAngle = 0.6;
  let moonAngle = 0.0;
  async function frame(){
    const now = performance.now();
    const dt = Math.min((now-last)/1000, 0.05);
    last = now;
    try{
      if(currentTab==='walk'){
        updatePlayer(dt);
        updateCamera();
      } else if(currentTab==='orbit'){
        orbitControls.update();
      } else {
        tidesControls.update();
        moonAngle += dt*0.15; // faster than the terrain-demo's illustrative day/night cycle - this orbit is the whole point of this tab
        const mx=Math.cos(moonAngle)*MOON_ORBIT_RADIUS, mz=Math.sin(moonAngle)*MOON_ORBIT_RADIUS;
        moonMesh.position.set(mx, 8, mz);
        moonPosUniform.value.set(mx, 8, mz);
        await renderer.computeAsync(tideDensityPass);
        await renderer.computeAsync(tideForcePass);
      }
      sunAngle += dt*0.04; // slow day/night cycle
      sun.position.set(Math.cos(sunAngle)*80, Math.sin(sunAngle)*80, 30);
      sunDirUniform.value.copy(sun.position).normalize();
      atmoDebugUniform.value = window.ATMO_DEBUG ? 1 : 0;
      const daylight = Math.max(0.15, Math.sin(sunAngle));
      sun.intensity = 1.0 + daylight*2.6;

      // Independent depth pre-pass for the atmosphere: terrain only -
      // water, atmosphere, the moon, and the tide particles are all
      // hidden here regardless of tab (none of them count as "solid
      // ground" for this calculation), rendered into their own
      // dedicated render target - never touches or is touched by the
      // main pass's depth buffer that water reads from. Real bug fixed
      // here: this used to unconditionally restore waterMesh.visible to
      // true afterward, which would have fought with the new TIDES tab
      // (showing the smooth water sphere and the SPH particles at the
      // same time) - visibility is now restored from setTab()'s actual
      // per-tab state instead of a hardcoded value.
      const wasWaterVisible = waterMesh.visible, wasMoonVisible = moonMesh.visible, wasParticlesVisible = tideParticles.visible;
      waterMesh.visible = false; atmoMesh.visible = false; moonMesh.visible = false; tideParticles.visible = false;
      renderer.setRenderTarget(atmoDepthTarget);
      await renderer.renderAsync(scene, activeCamera);
      renderer.setRenderTarget(null);
      waterMesh.visible = wasWaterVisible; atmoMesh.visible = true; moonMesh.visible = wasMoonVisible; tideParticles.visible = wasParticlesVisible;

      await renderer.renderAsync(scene, activeCamera);
      frameCount++;
      if(!loggedFirst){ loggedFirst=true; log('First frame rendered without error'); }
    }catch(e){
      if(frameCount<2 || frameCount%300===0) log('RENDER ERROR (frame '+frameCount+'): '+e.message);
    }
    requestAnimationFrame(frame);
  }
  frame();

  window.addEventListener('resize', ()=>{
    walkCamera.aspect = window.innerWidth/window.innerHeight;
    walkCamera.updateProjectionMatrix();
    orbitCamera.aspect = window.innerWidth/window.innerHeight;
    orbitCamera.updateProjectionMatrix();
    tidesCamera.aspect = window.innerWidth/window.innerHeight;
    tidesCamera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    atmoDepthTarget.setSize(window.innerWidth, window.innerHeight);
  });
}catch(e){
  log('ERROR: '+e.message+'\n'+e.stack);
}
}
main();
</script>
</body></html>
