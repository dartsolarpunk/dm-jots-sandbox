<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>html,body{margin:0;background:#05070d;overflow:hidden;}
#info{position:fixed;top:4px;left:4px;color:#7CFC7C;font-family:monospace;font-size:11px;white-space:pre;z-index:10;}</style>
</head><body>
<div id="info">loading...</div>
<script type="importmap">
{ "imports": { "three": "./three.webgpu.js", "three/webgpu": "./three.webgpu.js", "three/tsl": "./three.tsl.js" } }
</script>
<script type="module">
import * as THREE from 'three';
import {
  Fn, If, Loop, Break, storage, instanceIndex, uint, int, float, vec3,
  select, array, positionLocal, normalLocal, mx_fractal_noise_float, color,
  uniform, cameraPosition, normalize as tslNormalize
} from 'three/tsl';
import { EdgeVertexIndices, EdgeMasks, TriangleTable } from './mc_tables.js';

const info = document.getElementById('info');
const log = (s)=>{ info.textContent += s + '\n'; console.log(s); };

async function main(){
try{
  const renderer = new THREE.WebGPURenderer({antialias:false});
  await renderer.init();
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);
  log('Renderer OK');

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x05070d);
  const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.01, 1000);
  camera.position.set(3.2, 2.2, 3.2);
  camera.lookAt(0,0,0);
  scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  const sun = new THREE.DirectionalLight(0xffffff, 2.0);
  sun.position.set(2,3,2);
  scene.add(sun);

  // ── Chunk / grid setup ──────────────────────────────────────────
  // N cells per axis -> (N+1) density samples per axis. Density is a
  // signed-distance-ish field: sphere SDF (length(p)-R) plus layered
  // noise, so the isosurface (value==0) is a noisy "planet" surface.
  const N = 28;
  const GRID = N+1;
  const CELL = 2.0/N; // chunk spans [-1,1]^3 in local space
  const numPoints = GRID*GRID*GRID;
  const numCells = N*N*N;
  const MAX_TRIS_PER_CELL = 5;
  const maxVerts = numCells * MAX_TRIS_PER_CELL * 3;
  log('Grid '+GRID+'^3 = '+numPoints+' samples, '+numCells+' cells, maxVerts='+maxVerts);

  // ── Storage buffers ──────────────────────────────────────────────
  const densityBuf = new THREE.StorageInstancedBufferAttribute(numPoints, 1);
  const densityNode = storage(densityBuf, 'float', numPoints);

  const edgeMaskBuf = new THREE.StorageInstancedBufferAttribute(256, 1);
  const edgeMaskNode = storage(edgeMaskBuf, 'int', 256);
  const edgeMaskArr = new Int32Array(256);
  EdgeMasks.forEach((v,i)=>edgeMaskArr[i]=v);
  edgeMaskBuf.array.set(new Float32Array(edgeMaskArr.buffer)); // placeholder, real upload below

  // Three.js storage buffers for compute are typically populated by an
  // initial compute pass or by direct TypedArray upload before first
  // use. We upload via a small helper compute pass that just copies
  // constants in, since StorageInstancedBufferAttribute expects
  // Float32Array backing by default — for int buffers we instead build
  // the attribute with an Int32Array-typed array directly.
  const edgeMaskAttr = new THREE.StorageBufferAttribute(new Int32Array(EdgeMasks), 1, THREE.IntType ? undefined : undefined);
  const triTableFlat = new Int32Array(256*16);
  TriangleTable.forEach((row,i)=>{ for(let j=0;j<16;j++) triTableFlat[i*16+j]=row[j]; });
  const triTableAttr = new THREE.StorageBufferAttribute(triTableFlat, 1);

  const edgeMaskStorage = storage(edgeMaskAttr, 'int', 256);
  const triTableStorage = storage(triTableAttr, 'int', 256*16);

  const vertexBuf = new THREE.StorageInstancedBufferAttribute(maxVerts, 3);
  const vertexNode = storage(vertexBuf, 'vec3', maxVerts);
  const normalBuf = new THREE.StorageInstancedBufferAttribute(maxVerts, 3);
  const normalNode = storage(normalBuf, 'vec3', maxVerts);

  log('Buffers allocated');

  // ── Pass 1: density field ────────────────────────────────────────
  const RADIUS = 0.75;
  const densityFn = Fn(()=>{
    const idx = instanceIndex;
    const gz = idx.div(uint(GRID*GRID));
    const rem = idx.mod(uint(GRID*GRID));
    const gy = rem.div(uint(GRID));
    const gx = rem.mod(uint(GRID));
    const p = vec3(
      gx.toFloat().mul(CELL).sub(1.0),
      gy.toFloat().mul(CELL).sub(1.0),
      gz.toFloat().mul(CELL).sub(1.0)
    );
    const base = p.length().sub(RADIUS);
    const n1 = mx_fractal_noise_float(p.mul(2.2), 4, 2.0, 0.5).mul(0.14);
    const n2 = mx_fractal_noise_float(p.mul(6.0).add(vec3(5.2,1.7,9.3)), 3, 2.0, 0.5).mul(0.045);
    densityNode.element(idx).assign(base.sub(n1).sub(n2));
  });
  await renderer.computeAsync(densityFn().compute(numPoints));
  log('Density pass OK');

  // ── Pass 2: marching cubes extraction ────────────────────────────
  // Each thread = one cell. Reads its 8 corner densities, looks up the
  // MC case, interpolates up to 5 triangles, writes into its own fixed
  // 15-vertex slot (unused slots get a degenerate zero-area triangle
  // so the draw call can stay a single fixed-size non-indexed list —
  // no atomics / indirect-draw bookkeeping needed for this first pass).
  const mcFn = Fn(()=>{
    const cellIdx = instanceIndex;
    const cz = cellIdx.div(uint(N*N));
    const crem = cellIdx.mod(uint(N*N));
    const cy = crem.div(uint(N));
    const cx = crem.mod(uint(N));

    const cornerPos = array('vec3', 8);
    const cornerDensity = array('float', 8);

    Loop(8, ({i})=>{
      const dx = i.bitAnd(1);
      const dy = i.bitAnd(2).shiftRight(1);
      const dz = i.bitAnd(4).shiftRight(2);
      const gx = cx.add(dx), gy = cy.add(dy), gz = cz.add(dz);
      const flat = gx.add(gy.mul(uint(GRID))).add(gz.mul(uint(GRID*GRID)));
      cornerPos.element(i).assign(vec3(
        gx.toFloat().mul(CELL).sub(1.0),
        gy.toFloat().mul(CELL).sub(1.0),
        gz.toFloat().mul(CELL).sub(1.0)
      ));
      cornerDensity.element(i).assign(densityNode.element(flat));
    });

    const caseIdx = int(0).toVar();
    Loop(8, ({i})=>{
      If(cornerDensity.element(i).lessThan(0.0), ()=>{
        caseIdx.assign(caseIdx.bitOr(int(1).shiftLeft(i)));
      });
    });

    const outBase = cellIdx.mul(uint(MAX_TRIS_PER_CELL*3));
    // zero out this cell's slots by default (degenerate triangles)
    Loop(MAX_TRIS_PER_CELL*3, ({i})=>{
      vertexNode.element(outBase.add(uint(i))).assign(vec3(0,0,0));
      normalNode.element(outBase.add(uint(i))).assign(vec3(0,1,0));
    });

    Loop(MAX_TRIS_PER_CELL, ({i})=>{
      const triBase = caseIdx.mul(int(16)).add(i.mul(3));
      const e0 = triTableStorage.element(triBase);
      If(e0.greaterThanEqual(0), ()=>{
        const e1 = triTableStorage.element(triBase.add(1));
        const e2 = triTableStorage.element(triBase.add(2));

        const interp = (edge)=>{
          // 12-way select over the fixed EdgeVertexIndices pairs.
          let a = int(0), b = int(0);
          for(let k=0;k<12;k++){
            const [va,vb] = EdgeVertexIndices[k];
            a = select(edge.equal(int(k)), int(va), a);
            b = select(edge.equal(int(k)), int(vb), b);
          }
          const da = cornerDensity.element(a), db = cornerDensity.element(b);
          const pa = cornerPos.element(a), pb = cornerPos.element(b);
          const t = da.div(da.sub(db).add(1e-6));
          return pa.add(pb.sub(pa).mul(t));
        };

        const v0 = interp(e0), v1 = interp(e1), v2 = interp(e2);
        const nrm = v1.sub(v0).cross(v2.sub(v0)).normalize();
        const slot = i.mul(3);
        vertexNode.element(outBase.add(slot)).assign(v0);
        vertexNode.element(outBase.add(slot).add(1)).assign(v1);
        vertexNode.element(outBase.add(slot).add(2)).assign(v2);
        normalNode.element(outBase.add(slot)).assign(nrm);
        normalNode.element(outBase.add(slot).add(1)).assign(nrm);
        normalNode.element(outBase.add(slot).add(2)).assign(nrm);
      });
    });
  });
  await renderer.computeAsync(mcFn().compute(numCells));
  log('Marching cubes pass OK');

  // ── Render the GPU-generated mesh directly from the storage buffers
  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', vertexBuf);
  geometry.setAttribute('normal', normalBuf);
  geometry.computeBoundingSphere = ()=>{}; // skip CPU-side bbox (data lives on GPU)
  geometry.boundingSphere = new THREE.Sphere(new THREE.Vector3(0,0,0), 2);

  const material = new THREE.MeshStandardMaterial({ color: 0x6ea86a, roughness:0.85, metalness:0.05, side: THREE.DoubleSide });
  const mesh = new THREE.Mesh(geometry, material);
  scene.add(mesh);
  log('Mesh added to scene');

  mesh.rotation.y = 0.6;
  try{
    await renderer.renderAsync(scene, camera);
    log('Single render OK');
  }catch(e){
    log('RENDER ERROR: '+e.message);
  }
  window.__ready = true;
  log('READY');
}catch(e){
  log('ERROR: '+e.message+'\n'+e.stack);
  window.__ready = false;
}
}
main();
</script>
</body></html>
