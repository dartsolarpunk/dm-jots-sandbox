<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>html,body{margin:0;background:#05070d;overflow:hidden;height:100%;}
#info{position:fixed;top:4px;left:4px;color:#7CFC7C;font-family:monospace;font-size:10px;white-space:pre;z-index:10;pointer-events:none;max-width:90vw;}
#crosshair{position:fixed;top:50%;left:50%;width:6px;height:6px;margin:-3px 0 0 -3px;border-radius:50%;background:rgba(255,255,255,0.8);z-index:9;pointer-events:none;}
#hint{position:fixed;bottom:6px;left:6px;color:#9adba9;font-family:monospace;font-size:11px;z-index:10;pointer-events:none;}
.joy-zone{position:fixed;bottom:24px;width:132px;height:132px;border-radius:50%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.25);z-index:20;touch-action:none;}
#joy-look{left:24px;}
#joy-move{right:24px;}
.joy-stick{position:absolute;top:50%;left:50%;width:56px;height:56px;margin:-28px 0 0 -28px;border-radius:50%;background:rgba(255,255,255,0.35);border:1px solid rgba(255,255,255,0.5);pointer-events:none;}
#jump-btn{position:fixed;right:28px;bottom:172px;width:64px;height:64px;border-radius:50%;background:rgba(120,255,160,0.18);border:1px solid rgba(150,255,180,0.5);color:#cfffdd;font-family:monospace;font-size:11px;z-index:20;touch-action:none;display:flex;align-items:center;justify-content:center;}
/* Real bug found: a min-width media query used screen width as a proxy
   for "has keyboard/mouse" and hid these above 900px - but tablets in
   landscape are routinely wider than that despite being touch-only,
   which is exactly why they never appeared. Hidden by default here;
   JS below shows them directly based on actual touch capability. */
.joy-zone,#jump-btn{display:none;}
</style>
</head><body>
<div id="info">loading...</div>
<div id="crosshair"></div>
<div id="hint">Keyboard: WASD move, mouse look, Space jump · Touch: left=look, right=move+JUMP</div>
<div class="joy-zone" id="joy-move"><div class="joy-stick" id="joy-move-stick"></div></div>
<div class="joy-zone" id="joy-look"><div class="joy-stick" id="joy-look-stick"></div></div>
<button id="jump-btn">JUMP</button>
<script type="importmap">
{ "imports": { "three": "./three.webgpu.js", "three/webgpu": "./three.webgpu.js", "three/tsl": "./three.tsl.js" } }
</script>
<script type="module">
import * as THREE from 'three';
import {
  Fn, If, Loop, storage, instanceIndex, uint, int, float, vec3, vec4,
  select, mx_fractal_noise_float, mx_worley_noise_float, normalWorld, positionWorld, positionView,
  cameraPosition, mix, viewportLinearDepth, linearDepth, screenUV, time,
  normalize as tslNormalize, smoothstep, clamp, pow, reflect, dot, exp, uniform,
  texture, perspectiveDepthToViewZ, cameraNear, cameraFar
} from 'three/tsl';
import { EdgeVertexIndices, EdgeMasks, TriangleTable } from './mc_tables.js';

const info = document.getElementById('info');
// Real touch-capability detection, not screen width - a tablet in
// landscape can easily be wider than a "desktop" breakpoint.
const hasTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
if(hasTouch){
  document.getElementById('joy-move').style.display = 'block';
  document.getElementById('joy-look').style.display = 'block';
  document.getElementById('jump-btn').style.display = 'flex';
}
const log = (s)=>{ info.textContent += s + '\n'; console.log(s); };

function hash3(x,y,z){ let h=Math.sin(x*127.1+y*311.7+z*74.7)*43758.5453123; return h-Math.floor(h); }
function valueNoise3(x,y,z){
  const xi=Math.floor(x),yi=Math.floor(y),zi=Math.floor(z);
  const xf=x-xi,yf=y-yi,zf=z-zi;
  const u=xf*xf*(3-2*xf),v=yf*yf*(3-2*yf),w=zf*zf*(3-2*zf);
  const lerp=(a,b,t)=>a+(b-a)*t;
  const c000=hash3(xi,yi,zi),c100=hash3(xi+1,yi,zi),c010=hash3(xi,yi+1,zi),c110=hash3(xi+1,yi+1,zi);
  const c001=hash3(xi,yi,zi+1),c101=hash3(xi+1,yi,zi+1),c011=hash3(xi,yi+1,zi+1),c111=hash3(xi+1,yi+1,zi+1);
  const x00=lerp(c000,c100,u),x10=lerp(c010,c110,u),x01=lerp(c001,c101,u),x11=lerp(c011,c111,u);
  const y0=lerp(x00,x10,v),y1=lerp(x01,x11,v);
  return lerp(y0,y1,w)*2-1;
}
function fractalNoise3(x,y,z,octaves,lac,gain){
  let amp=1,freq=1,sum=0,norm=0;
  for(let i=0;i<octaves;i++){ sum+=valueNoise3(x*freq,y*freq,z*freq)*amp; norm+=amp; amp*=gain; freq*=lac; }
  return sum/norm;
}
const PLANET_RADIUS = 12;
function groundRadiusAt(dirX,dirY,dirZ){
  const p2=2.3;
  const n1=fractalNoise3(dirX*p2,dirY*p2,dirZ*p2,5,2.0,0.5);
  const ridge=1-Math.abs(n1);
  const n2=fractalNoise3(dirX*p2*3+9.1,dirY*p2*3+2.3,dirZ*p2*3+4.7,3,2.0,0.5);
  const billow=Math.abs(n2);
  const terrain=ridge*ridge*0.9-billow*0.35;
  return PLANET_RADIUS+terrain*1.4;
}

async function main(){
try{
  const renderer = new THREE.WebGPURenderer({antialias:false});
  await renderer.init();
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);
  log('Renderer OK');

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x03040a);
  const camera = new THREE.PerspectiveCamera(65, window.innerWidth/window.innerHeight, 0.05, 500);

  {
    const N=2000, pos=new Float32Array(N*3);
    for(let i=0;i<N;i++){
      const r=180+Math.random()*40, th=Math.random()*Math.PI*2, ph=Math.acos(2*Math.random()-1);
      pos[i*3]=r*Math.sin(ph)*Math.cos(th); pos[i*3+1]=r*Math.sin(ph)*Math.sin(th); pos[i*3+2]=r*Math.cos(ph);
    }
    const starGeo=new THREE.BufferGeometry();
    starGeo.setAttribute('position', new THREE.BufferAttribute(pos,3));
    scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({size:0.6,color:0xffffff})));
  }

  const sun = new THREE.DirectionalLight(0xfff2e0, 3.2);
  sun.position.set(60,40,30);
  scene.add(sun);
  scene.add(new THREE.AmbientLight(0x304050, 0.55));

  const N = 46;
  const GRID = N+1;
  const HALF = PLANET_RADIUS*1.35;
  const CELL = (HALF*2)/N;
  const numPoints = GRID*GRID*GRID;
  const numCells = N*N*N;
  const MAX_TRIS_PER_CELL = 5;
  const maxVerts = numCells*MAX_TRIS_PER_CELL*3;
  log('Terrain grid '+GRID+'^3, '+numCells+' cells, maxVerts='+maxVerts);

  const densityBuf = new THREE.StorageInstancedBufferAttribute(numPoints, 1);
  const densityNode = storage(densityBuf, 'float', numPoints);
  const triTableFlat = new Int32Array(256*16);
  TriangleTable.forEach((row,i)=>{ for(let j=0;j<16;j++) triTableFlat[i*16+j]=row[j]; });
  const triTableAttr = new THREE.StorageBufferAttribute(triTableFlat, 1);
  const triTableStorage = storage(triTableAttr, 'int', 256*16);

  const vertexBuf = new THREE.StorageBufferAttribute(maxVerts, 3);
  const vertexNode = storage(vertexBuf, 'vec3', maxVerts);
  const normalBuf = new THREE.StorageBufferAttribute(maxVerts, 3);
  const normalNode = storage(normalBuf, 'vec3', maxVerts);
  const colorBuf = new THREE.StorageBufferAttribute(maxVerts, 3);
  const colorNode = storage(colorBuf, 'vec3', maxVerts);
  log('Buffers allocated');

  const densityFn = Fn(()=>{
    const idx = instanceIndex;
    const gz = idx.div(uint(GRID*GRID));
    const rem = idx.mod(uint(GRID*GRID));
    const gy = rem.div(uint(GRID));
    const gx = rem.mod(uint(GRID));
    const p = vec3(gx.toFloat().mul(CELL).sub(HALF), gy.toFloat().mul(CELL).sub(HALF), gz.toFloat().mul(CELL).sub(HALF));
    const dir = p.normalize();
    const base = p.length().sub(PLANET_RADIUS);
    const n1 = mx_fractal_noise_float(dir.mul(2.3), 5, 2.0, 0.5);
    const ridge = float(1.0).sub(n1.abs());
    const n2 = mx_fractal_noise_float(dir.mul(6.9).add(vec3(9.1,2.3,4.7)), 3, 2.0, 0.5);
    const billow = n2.abs();
    const terrain = ridge.mul(ridge).mul(0.9).sub(billow.mul(0.35));

    // ── Craters, via Worley (cellular) noise. mx_worley_noise_float
    // returns something distance-like from each point to its nearest
    // random cell center - small right at a center, growing away from
    // it. Using exp(-w^2 * k) turns that into a Gaussian bowl profile
    // that's robust regardless of this implementation's exact output
    // scale (no need to know its precise numeric range, just that it's
    // ~0 at centers and grows outward). A second, larger-scale Worley
    // layer gives bigger/rarer craters than the first, same idea two
    // asteroid-belt games use to mix crater sizes.
    const w1 = mx_worley_noise_float(dir.mul(4.2));
    const profile1 = exp(w1.mul(w1).mul(-22.0));
    const w2 = mx_worley_noise_float(dir.mul(1.6).add(vec3(31.0,7.0,19.0)));
    const profile2 = exp(w2.mul(w2).mul(-38.0));
    const bowl = profile1.mul(0.22).add(profile2.mul(0.55));
    const rim1 = smoothstep(0.04,0.22,profile1).sub(smoothstep(0.22,0.42,profile1)).mul(0.06);
    const rim2 = smoothstep(0.03,0.18,profile2).sub(smoothstep(0.18,0.34,profile2)).mul(0.14);
    const craterRim = rim1.add(rim2);

    densityNode.element(idx).assign(base.sub(terrain.mul(1.4)).add(bowl).sub(craterRim));
  });
  await renderer.computeAsync(densityFn().compute(numPoints));
  log('Density pass OK');

  const mcFn = Fn(()=>{
    const cellIdx = instanceIndex;
    const cz = cellIdx.div(uint(N*N));
    const crem = cellIdx.mod(uint(N*N));
    const cy = crem.div(uint(N));
    const cx = crem.mod(uint(N));

    const readCorner = (i)=>{
      const dx=i&1, dy=(i>>1)&1, dz=(i>>2)&1;
      const gx=cx.add(dx), gy=cy.add(dy), gz=cz.add(dz);
      const flat = gx.add(gy.mul(uint(GRID))).add(gz.mul(uint(GRID*GRID)));
      return {
        pos: vec3(gx.toFloat().mul(CELL).sub(HALF), gy.toFloat().mul(CELL).sub(HALF), gz.toFloat().mul(CELL).sub(HALF)),
        density: densityNode.element(flat),
      };
    };
    const c0=readCorner(0),c1=readCorner(1),c2=readCorner(2),c3=readCorner(3),
          c4=readCorner(4),c5=readCorner(5),c6=readCorner(6),c7=readCorner(7);
    const corners=[c0,c1,c2,c3,c4,c5,c6,c7];

    const caseIdx = int(0).toVar();
    corners.forEach((c,i)=>{
      If(c.density.lessThan(0.0), ()=>{ caseIdx.assign(caseIdx.bitOr(int(1<<i))); });
    });

    const outBase = cellIdx.mul(uint(MAX_TRIS_PER_CELL*3));
    Loop(MAX_TRIS_PER_CELL*3, ({i})=>{
      vertexNode.element(outBase.add(uint(i))).assign(vec3(0,0,0));
      normalNode.element(outBase.add(uint(i))).assign(vec3(0,1,0));
      colorNode.element(outBase.add(uint(i))).assign(vec3(0,0,0));
    });

    Loop(MAX_TRIS_PER_CELL, ({i})=>{
      const triBase = caseIdx.mul(int(16)).add(i.mul(3));
      const e0 = triTableStorage.element(triBase);
      If(e0.greaterThanEqual(0), ()=>{
        const e1 = triTableStorage.element(triBase.add(1));
        const e2 = triTableStorage.element(triBase.add(2));

        const interp = (edge)=>{
          let pa=corners[0].pos, pb=corners[0].pos, da=corners[0].density, db=corners[0].density;
          EdgeVertexIndices.forEach(([va,vb],k)=>{
            const match = edge.equal(int(k));
            pa = select(match, corners[va].pos, pa);
            pb = select(match, corners[vb].pos, pb);
            da = select(match, corners[va].density, da);
            db = select(match, corners[vb].density, db);
          });
          const t = da.div(da.sub(db).add(1e-6));
          return pa.add(pb.sub(pa).mul(t));
        };

        const v0=interp(e0), v1=interp(e1), v2=interp(e2);
        const nrm = v1.sub(v0).cross(v2.sub(v0)).normalize();

        const colorFor = (v)=>{
          const r = v.length();
          const height = r.sub(PLANET_RADIUS);
          const up = v.normalize();
          const slope = float(1.0).sub(nrm.dot(up).clamp(0.0,1.0));
          const rock = vec3(0.42,0.38,0.34);
          const sand = vec3(0.76,0.68,0.48);
          const grass = vec3(0.28,0.46,0.22);
          const snow = vec3(0.92,0.94,0.97);
          let c = mix(sand, grass, height.add(0.3).div(0.6).clamp(0.0,1.0));
          c = mix(c, rock, slope.smoothstep(0.35,0.75));
          c = mix(c, snow, height.sub(0.65).div(0.3).clamp(0.0,1.0));
          return c;
        };
        const col = colorFor(v0).add(colorFor(v1)).add(colorFor(v2)).div(3.0);

        const slot = i.mul(3);
        vertexNode.element(outBase.add(slot)).assign(v0);
        vertexNode.element(outBase.add(slot).add(1)).assign(v1);
        vertexNode.element(outBase.add(slot).add(2)).assign(v2);
        normalNode.element(outBase.add(slot)).assign(nrm);
        normalNode.element(outBase.add(slot).add(1)).assign(nrm);
        normalNode.element(outBase.add(slot).add(2)).assign(nrm);
        colorNode.element(outBase.add(slot)).assign(col);
        colorNode.element(outBase.add(slot).add(1)).assign(col);
        colorNode.element(outBase.add(slot).add(2)).assign(col);
      });
    });
  });
  await renderer.computeAsync(mcFn().compute(numCells));
  log('Marching cubes + biome color pass OK');

  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', vertexBuf);
  geometry.setAttribute('normal', normalBuf);
  geometry.setAttribute('color', colorBuf);
  geometry.boundingSphere = new THREE.Sphere(new THREE.Vector3(0,0,0), HALF*1.5);
  const material = new THREE.MeshStandardMaterial({ vertexColors:true, roughness:0.92, metalness:0.02, side:THREE.DoubleSide });
  const terrainMesh = new THREE.Mesh(geometry, material);
  scene.add(terrainMesh);
  log('Terrain mesh added');

  // ── Water: depth-aware shading. The terrain (opaque) renders first
  // in the same frame, so by the time this transparent water fragment
  // shades, viewportLinearDepth already holds "whatever's behind me" -
  // comparing that to this fragment's own depth gives the water column
  // thickness at each point, which drives color/opacity (shallow near
  // shore = lighter/more see-through, deep = darker/more opaque),
  // shoreline foam (thickness near zero), and it's all recomputed live
  // if the terrain changes, no separate baked mask needed.
  const waterGeo = new THREE.SphereGeometry(PLANET_RADIUS+0.02, 96, 64);
  const waterMat = new THREE.MeshStandardNodeMaterial({
    transparent:true, side:THREE.DoubleSide, depthWrite:false, roughness:0.2, metalness:0.05,
  });

  const sceneDepth = viewportLinearDepth;
  const surfaceDepth = linearDepth(positionView.z);
  const depthDiff = sceneDepth.sub(surfaceDepth).max(0.0);
  const depthFactor = depthDiff.mul(60.0).clamp(0.0, 1.0);

  const shallowColor = vec3(0.30, 0.72, 0.68);
  const deepColor = vec3(0.02, 0.09, 0.20);
  const baseColor = mix(shallowColor, deepColor, depthFactor);

  // Shoreline foam: a thin band where depth-into-water is near zero.
  const foam = float(1.0).sub(smoothstep(0.0, 0.008, depthDiff));
  const foamNoise = mx_fractal_noise_float(positionWorld.mul(8.0).add(vec3(time.mul(0.3),0,time.mul(0.2))), 3, 2.0, 0.5);
  const foamMask = foam.mul(smoothstep(0.15, 0.6, foamNoise.mul(0.5).add(0.5)).add(0.4).clamp(0.0,1.0));

  waterMat.colorNode = mix(baseColor, vec3(1,1,1), foamMask);
  waterMat.opacityNode = clamp(float(0.35).add(depthFactor.mul(0.55)).add(foamMask.mul(0.45)), 0.0, 0.96);

  // Animated wave normal: perturbs the shading normal with time-scrolling
  // noise so specular highlights break up into moving glints instead of
  // one static mirror-like hotspot.
  const wavePos = positionWorld.mul(2.6).add(vec3(time.mul(0.15), 0.0, time.mul(0.11)));
  const waveN = mx_fractal_noise_float(wavePos, 4, 2.0, 0.5);
  const wavePos2 = positionWorld.mul(2.6).add(vec3(time.mul(0.11).add(50.0), 0.0, time.mul(-0.13)));
  const waveN2 = mx_fractal_noise_float(wavePos2, 4, 2.0, 0.5);
  waterMat.normalNode = tslNormalize(normalWorld.add(vec3(waveN.mul(0.12), waveN2.mul(0.12), waveN.mul(waveN2).mul(0.08))));

  const waterMesh = new THREE.Mesh(waterGeo, waterMat);
  scene.add(waterMesh);
  log('Water sphere added (depth-aware, animated waves, shoreline foam)');

  // ── Atmosphere: independent depth pass. Per the description of the
  // reference approach - atmosphere fog/horizon shouldn't be computed
  // from the same depth buffer the water pass uses (even though in
  // practice water's depthWrite:false means it wouldn't actually
  // interfere here, a genuinely separate pass makes that true by
  // construction rather than by a detail of write-mask settings that
  // could silently break if either material changes later). This
  // render target + its own dedicated pre-pass render call exists only
  // for the atmosphere to sample - completely decoupled from the main
  // pass's own depth buffer that water reads via viewportLinearDepth.
  const atmoDepthTarget = new THREE.RenderTarget(window.innerWidth, window.innerHeight);
  atmoDepthTarget.depthTexture = new THREE.DepthTexture();
  atmoDepthTarget.depthTexture.type = THREE.FloatType;

  const atmoGeo = new THREE.SphereGeometry(HALF*1.02, 48, 32);
  const atmoMat = new THREE.MeshBasicNodeMaterial({ transparent:true, side:THREE.BackSide, depthWrite:false, blending:THREE.AdditiveBlending });
  const viewDir = positionWorld.sub(cameraPosition).normalize();
  const fresnel = float(1.0).sub(viewDir.dot(normalWorld).abs()).pow(3.0);

  // Sample the atmosphere's OWN depth texture (not the shared scene
  // depth water uses) to find how far away whatever's behind this sky
  // pixel actually is - terrain close by (near the horizon/ground)
  // gets thicker fog; open sky (nothing in the depth pre-pass, reads
  // as far-plane) gets the plain Fresnel glow with no added fog.
  const atmoDepthNode = texture(atmoDepthTarget.depthTexture, screenUV);
  const atmoViewZ = perspectiveDepthToViewZ(atmoDepthNode.r, cameraNear, cameraFar);
  const myViewZ = positionView.z;
  const distThroughAtmo = atmoViewZ.sub(myViewZ).abs().clamp(0.0, 40.0).div(40.0);
  const horizonFog = smoothstep(0.0, 0.5, distThroughAtmo);

  atmoMat.colorNode = mix(vec3(0.4,0.65,1.0).mul(fresnel).mul(1.4), vec3(0.75,0.82,0.95), horizonFog.mul(fresnel));
  atmoMat.opacityNode = clamp(fresnel.add(horizonFog.mul(fresnel).mul(0.6)), 0.0, 1.0);
  const atmoMesh = new THREE.Mesh(atmoGeo, atmoMat);
  scene.add(atmoMesh);
  log('Atmosphere shell added (independent depth pass for horizon fog)');

  const startDir = new THREE.Vector3(0.3,0.85,0.3).normalize();
  const player = {
    pos: startDir.clone().multiplyScalar(groundRadiusAt(startDir.x,startDir.y,startDir.z)+1.8),
    vel: new THREE.Vector3(),
    yaw: 0, pitch: -0.15,
    onGround: false,
  };
  const keys = {};
  window.addEventListener('keydown', e=>keys[e.code]=true);
  window.addEventListener('keyup', e=>keys[e.code]=false);
  let pointerLocked = false;
  renderer.domElement.addEventListener('click', ()=>renderer.domElement.requestPointerLock());
  document.addEventListener('pointerlockchange', ()=>{ pointerLocked = document.pointerLockElement===renderer.domElement; });
  document.addEventListener('mousemove', e=>{
    if(!pointerLocked) return;
    player.yaw -= e.movementX*0.0025;
    player.pitch = Math.max(-1.4, Math.min(1.4, player.pitch - e.movementY*0.0025));
  });

  // ── Touch joysticks (tablet/no-keyboard support) ─────────────────
  // Real bug avoided here: touch coordinates must be tracked per
  // touch.identifier, not just "the last touch," or a second finger
  // (e.g. look-stick while move-stick is still held) steals the first
  // finger's drag state and both sticks jump around.
  const joyMove = { x:0, y:0 };
  const joyLook = { dx:0, dy:0 };
  function setupJoystick(zoneId, stickId, onMove, onEnd){
    const zone = document.getElementById(zoneId);
    const stick = document.getElementById(stickId);
    let touchId = null, cx=0, cy=0;
    const radius = 66;
    function start(e){
      const t = e.changedTouches[0];
      touchId = t.identifier;
      const rect = zone.getBoundingClientRect();
      cx = rect.left+rect.width/2; cy = rect.top+rect.height/2;
      e.preventDefault();
    }
    function move(e){
      for(const t of e.changedTouches){
        if(t.identifier!==touchId) continue;
        let dx=t.clientX-cx, dy=t.clientY-cy;
        const len=Math.hypot(dx,dy);
        if(len>radius){ dx=dx/len*radius; dy=dy/len*radius; }
        stick.style.transform = `translate(${dx}px,${dy}px)`;
        onMove(dx/radius, dy/radius);
        e.preventDefault();
      }
    }
    function end(e){
      for(const t of e.changedTouches){
        if(t.identifier!==touchId) continue;
        touchId=null;
        stick.style.transform = '';
        onEnd();
      }
    }
    zone.addEventListener('touchstart', start, {passive:false});
    zone.addEventListener('touchmove', move, {passive:false});
    zone.addEventListener('touchend', end, {passive:false});
    zone.addEventListener('touchcancel', end, {passive:false});
  }
  setupJoystick('joy-look','joy-look-stick',
    (nx,ny)=>{ joyLook.dx=nx; joyLook.dy=ny; },
    ()=>{ joyLook.dx=0; joyLook.dy=0; });
  setupJoystick('joy-move','joy-move-stick',
    (nx,ny)=>{ joyMove.x=nx; joyMove.y=ny; },
    ()=>{ joyMove.x=0; joyMove.y=0; });

  // Real bug found: jumpHeld was set true on touchstart and false on
  // touchend - a quick tap can fire both of those within the same
  // ~16ms window between two animation frames, so updatePlayer() would
  // never actually see it as true even though the tap clearly happened
  // (this is exactly the "I'm tapping here but it's doing nothing" and
  // the "jumping and stuttering" symptoms - the rare frame where it WAS
  // seen as true could line up with a mid-air onGround flicker). Fixed
  // with an edge-triggered queued flag: touchstart queues a jump,
  // updatePlayer() consumes and clears it next frame regardless of how
  // briefly the button was actually held.
  let jumpQueued = false;
  const jumpBtn = document.getElementById('jump-btn');
  jumpBtn.addEventListener('touchstart', e=>{ jumpQueued=true; e.preventDefault(); }, {passive:false});
  jumpBtn.addEventListener('touchend', e=>{ e.preventDefault(); }, {passive:false});
  window.addEventListener('keydown', e=>{ if(e.code==='Space') jumpQueued=true; });

  const GRAVITY = 9.0;
  const MOVE_SPEED = 4.5;
  const JUMP_SPEED = 5.2;
  const tmpUp = new THREE.Vector3(), tmpFwd = new THREE.Vector3(), tmpRight = new THREE.Vector3();
  const qYaw = new THREE.Quaternion(), qPitch = new THREE.Quaternion();

  function updatePlayer(dt){
    // Look-stick applies a continuous rotation rate (it's a joystick,
    // not a mouse-delta) — proportional to how far it's pushed.
    player.yaw -= joyLook.dx*dt*2.4;
    player.pitch = Math.max(-1.4, Math.min(1.4, player.pitch - joyLook.dy*dt*2.4));

    const dir = player.pos.clone().normalize();
    tmpUp.copy(dir);

    const worldFwdRef = Math.abs(tmpUp.y) < 0.99 ? new THREE.Vector3(0,1,0) : new THREE.Vector3(1,0,0);
    tmpRight.crossVectors(worldFwdRef, tmpUp).normalize();
    tmpFwd.crossVectors(tmpUp, tmpRight).normalize();
    qYaw.setFromAxisAngle(tmpUp, player.yaw);
    const fwd = tmpFwd.clone().applyQuaternion(qYaw);
    const right = tmpRight.clone().applyQuaternion(qYaw);

    let moveX=0, moveZ=0;
    if(keys['KeyW']) moveZ+=1; if(keys['KeyS']) moveZ-=1;
    if(keys['KeyD']) moveX+=1; if(keys['KeyA']) moveX-=1;
    moveX += joyMove.x; moveZ -= joyMove.y; // joystick y is screen-down-positive, forward is up-on-stick
    const moveVec = new THREE.Vector3().addScaledVector(fwd,moveZ).addScaledVector(right,moveX);
    if(moveVec.lengthSq()>1) moveVec.normalize();
    moveVec.multiplyScalar(MOVE_SPEED);

    player.vel.addScaledVector(tmpUp, -GRAVITY*dt);
    player.vel.copy(moveVec).addScaledVector(tmpUp, player.vel.dot(tmpUp));

    if(jumpQueued && player.onGround){
      jumpQueued = false;
      player.vel.addScaledVector(tmpUp, JUMP_SPEED);
      player.onGround = false;
    }

    player.pos.addScaledVector(player.vel, dt);
    const newLen = player.pos.length();
    const newDir = player.pos.clone().divideScalar(newLen);
    const newGroundR = groundRadiusAt(newDir.x,newDir.y,newDir.z);
    const eyeHeight = 1.8;
    if(newLen < newGroundR+eyeHeight){
      player.pos.copy(newDir).multiplyScalar(newGroundR+eyeHeight);
      player.vel.addScaledVector(newDir, -player.vel.dot(newDir));
      player.onGround = true;
    } else {
      player.onGround = false;
    }
  }

  function updateCamera(){
    const dir = player.pos.clone().normalize();
    camera.position.copy(player.pos);
    const worldFwdRef = Math.abs(dir.y) < 0.99 ? new THREE.Vector3(0,1,0) : new THREE.Vector3(1,0,0);
    const right = new THREE.Vector3().crossVectors(worldFwdRef, dir).normalize();
    const fwd = new THREE.Vector3().crossVectors(dir, right).normalize();
    qYaw.setFromAxisAngle(dir, player.yaw);
    qPitch.setFromAxisAngle(right.clone().applyQuaternion(qYaw), player.pitch);
    const lookDir = fwd.clone().applyQuaternion(qYaw).applyQuaternion(qPitch);
    camera.up.copy(dir);
    camera.lookAt(camera.position.clone().add(lookDir));
  }

  log('Character controller ready (small-planet walker)');
  log('READY');

  let last = performance.now();
  let frameCount=0, loggedFirst=false;
  let sunAngle = 0.6;
  async function frame(){
    const now = performance.now();
    const dt = Math.min((now-last)/1000, 0.05);
    last = now;
    try{
      updatePlayer(dt);
      updateCamera();
      sunAngle += dt*0.04; // slow day/night cycle
      sun.position.set(Math.cos(sunAngle)*80, Math.sin(sunAngle)*80, 30);
      const daylight = Math.max(0.15, Math.sin(sunAngle));
      sun.intensity = 1.0 + daylight*2.6;

      // Independent depth pre-pass for the atmosphere: terrain only,
      // water and atmosphere itself hidden, rendered into their own
      // dedicated render target - never touches or is touched by the
      // main pass's depth buffer that water reads from.
      waterMesh.visible = false; atmoMesh.visible = false;
      renderer.setRenderTarget(atmoDepthTarget);
      await renderer.renderAsync(scene, camera);
      renderer.setRenderTarget(null);
      waterMesh.visible = true; atmoMesh.visible = true;

      await renderer.renderAsync(scene, camera);
      frameCount++;
      if(!loggedFirst){ loggedFirst=true; log('First frame rendered without error'); }
    }catch(e){
      if(frameCount<2 || frameCount%300===0) log('RENDER ERROR (frame '+frameCount+'): '+e.message);
    }
    requestAnimationFrame(frame);
  }
  frame();
}catch(e){
  log('ERROR: '+e.message+'\n'+e.stack);
}
}
main();
</script>
</body></html>
